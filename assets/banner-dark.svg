<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <!-- Gradient mesh background -->
    <radialGradient id="glow1" cx="15%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass card filter -->
    <filter id="glass-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Border gradient for glass card -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="80%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="900" height="220" rx="12" fill="#0d1117"/>

  <!-- Gradient mesh layers -->
  <rect width="900" height="220" rx="12" fill="url(#glow1)"/>
  <rect width="900" height="220" rx="12" fill="url(#glow2)"/>
  <rect width="900" height="220" rx="12" fill="url(#glow3)"/>

  <!-- Noise overlay -->
  <rect width="900" height="220" rx="12" filter="url(#noise)" opacity="0.5"/>

  <!-- Grid dots pattern (subtle) -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#fff"/>
    </pattern>
    <rect width="900" height="220" fill="url(#dots)"/>
  </g>

  <!-- Glass card -->
  <g filter="url(#shadow)">
    <rect x="60" y="40" width="780" height="140" rx="16" fill="#161b22" fill-opacity="0.55"/>
    <rect x="60" y="40" width="780" height="140" rx="16" fill="none" stroke="url(#border-grad)" stroke-width="1"/>
  </g>

  <!-- Frosted inner glow -->
  <rect x="62" y="42" width="776" height="136" rx="14" fill="#6366f1" fill-opacity="0.03"/>

  <!-- Small decorative orb -->
  <circle cx="140" cy="110" r="40" fill="#a855f7" fill-opacity="0.06"/>
  <circle cx="760" cy="90" r="30" fill="#06b6d4" fill-opacity="0.05"/>

  <!-- Status indicator dot -->
  <circle cx="110" cy="86" r="4" fill="#34d399"/>
  <circle cx="110" cy="86" r="4" fill="#34d399" opacity="0.4">
    <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Name -->
  <text x="130" y="92" fill="url(#text-grad)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">Bright</text>
  <text x="220" y="92" fill="#8b949e" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" letter-spacing="-0.5">/ Sunwin98</text>

  <!-- Tagline -->
  <text x="130" y="122" fill="#8b949e" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13.5" font-weight="400" letter-spacing="0.2">
    Developer · Minecraft Bedrock Tooling · AI-Assisted Workflows
  </text>

  <!-- Accent keywords -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">
    <rect x="130" y="138" width="62" height="22" rx="6" fill="#6366f1" fill-opacity="0.15"/>
    <text x="142" y="153" fill="#a5b4fc">Node.js</text>

    <rect x="200" y="138" width="42" height="22" rx="6" fill="#a855f7" fill-opacity="0.12"/>
    <text x="209" y="153" fill="#c4b5fd">Web</text>

    <rect x="250" y="138" width="30" height="22" rx="6" fill="#06b6d4" fill-opacity="0.12"/>
    <text x="257" y="153" fill="#67e8f9">AI</text>

    <rect x="288" y="138" width="72" height="22" rx="6" fill="#34d399" fill-opacity="0.1"/>
    <text x="297" y="153" fill="#6ee7b7">Bedrock</text>
  </g>

  <!-- Decorative code snippet (right side) -->
  <g opacity="0.25" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="10.5">
    <text x="560" y="78" fill="#6366f1">const</text>
    <text x="595" y="78" fill="#e0e7ff">stack</text>
    <text x="630" y="78" fill="#8b949e">=</text>
    <text x="640" y="78" fill="#8b949e">{</text>
    <text x="575" y="94" fill="#a5b4fc">runtime</text>
    <text x="620" y="94" fill="#8b949e">:</text>
    <text x="630" y="94" fill="#34d399">'node'</text>
    <text x="575" y="110" fill="#a5b4fc">ai</text>
    <text x="590" y="110" fill="#8b949e">:</text>
    <text x="600" y="110" fill="#34d399">'copilot'</text>
    <text x="575" y="126" fill="#a5b4fc">platform</text>
    <text x="630" y="126" fill="#8b949e">:</text>
    <text x="640" y="126" fill="#34d399">'bedrock'</text>
    <text x="560" y="142" fill="#8b949e">}</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="100" y="196" width="700" height="1.5" rx="1" fill="url(#accent-line)"/>
</svg>